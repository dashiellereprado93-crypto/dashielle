<!DOCTYPE html>
<html>
<head>
<title>Embedded Style Example</title>
<style>
  body {
    font-family: Arial, sans-serif;
  }
  h1 {
    color: navy;
    text-align: center;
  }
  p {
    font-size: 16px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<h1>Welcome to My Page</h1>
<p>This is a paragraph with embedded styles.  It's a simple example to show how embedded CSS works within an HTML document.</p>

</body>
</html>
