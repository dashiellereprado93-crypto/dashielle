<!DOCTYPE html>
<html>
<head>
    <title>Class Example</title>
    <style type="text/css">
        .highlight {
            color: white;
            background-color: green;
            padding: 5px;
        }
        p.note {
            color: blue;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Class Examples</h1>

    <div class="highlight">
        This div uses the "highlight" class.
    </div>

    <p class="note">
        This paragraph uses the "note" class and will be blue.
    </p>

    <p>
        This is a regular paragraph.
    </p>

</body>
</html>
